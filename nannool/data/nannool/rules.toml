# -----------------------------------------------------------------------------

[[rules]]
id = "kuril-seriya-la-229"
nannool_verses = [229]
tamil_name = "குறில் செறியா ல அல்வழி"
english_name = "La without short vowel sandhi"
category = "thirithal"
priority = 45
description = "ல் not preceded by short vowel in அல்வழி - when த follows: த becomes ற, then ல may drop; when ந follows after change: ந becomes ன then may drop; before vallinam: natural or with change"

[rules.left_context]
type = "specific_mei"
letters = ["ல்"]

[rules.right_context]
type = "specific_mei"
letters = ["த்"]

[rules.transformation]
type = "compound"
steps = [
  { type = "replace_beginning", old = "த", new = "ற" },
  { type = "delete_from_first", count = 1 }
]

[[rules.examples]]
first = "கோல்"
second = "தச்சன்"
result = "கோற்றச்சன்"

[[rules.examples]]
