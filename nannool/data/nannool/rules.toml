# Nannool Sandhi Rules
# Formalized rules from Nannool verses 151-257
# Format follows the SandhiRule struct

# =============================================================================
# உயிரீற்றுப் புணரியல் (Vowel-ending Sandhi) - Verses 151-203
# =============================================================================

# -----------------------------------------------------------------------------
# Core உடம்படுமெய் (Buffer Consonant) Rules - Verse 162
# -----------------------------------------------------------------------------

[[rules]]
id = "udampadumei-ya-162"
nannool_verses = [162]
tamil_name = "உடம்படுமெய் - யகரம்"
english_name = "Buffer consonant - ya"
category = "thondral"
priority = 60
description = "After இ/ஈ/ஐ, ய் appears before a following vowel"

[rules.left_context]
type = "specific_uyir"
letters = ["இ", "ஈ", "ஐ"]

[rules.right_context]
type = "any_uyir"

[rules.transformation]
type = "insert"
text = "ய்"

# -----------------------------------------------------------------------------

[[rules]]
id = "udampadumei-va-162"
nannool_verses = [162]
tamil_name = "உடம்படுமெய் - வகரம்"
english_name = "Buffer consonant - va"
category = "thondral"
priority = 60
description = "After vowels other than இ/ஈ/ஐ/ஏ, வ் appears before a following vowel"

[rules.left_context]
type = "specific_uyir"
letters = ["அ", "ஆ", "உ", "ஊ", "எ", "ஒ", "ஓ", "ஔ"]

[rules.right_context]
type = "any_uyir"

[rules.transformation]
type = "insert"
text = "வ்"

# -----------------------------------------------------------------------------

[[rules]]
id = "udampadumei-e-162"
nannool_verses = [162]
tamil_name = "உடம்படுமெய் - ஏகாரம்"
english_name = "Buffer consonant - e variant"
category = "thondral"
priority = 59
description = "After ஏ, either ய் or வ் can appear before a following vowel"

[rules.left_context]
type = "specific_uyir"
letters = ["ஏ"]

[rules.right_context]
type = "any_uyir"

[rules.transformation]
type = "insert"
text = "ய்"

# -----------------------------------------------------------------------------
# எகர வினா Rules - Verse 163
# -----------------------------------------------------------------------------

[[rules]]
id = "ekara-vina-163"
nannool_verses = [163]
tamil_name = "எகர வினா புணர்ச்சி"
english_name = "Interrogative e sandhi"
category = "thondral"
priority = 58
description = "எ interrogative before vowel - ய் or வ் may appear"

[rules.left_context]
type = "specific_uyir"
letters = ["எ"]

[rules.right_context]
type = "any_uyir"

[rules.transformation]
type = "insert"
text = "வ்"

# -----------------------------------------------------------------------------

[[rules]]
id = "suttu-vina-163"
nannool_verses = [163]
tamil_name = "சுட்டு வினா புணர்ச்சி"
english_name = "Demonstrative/Interrogative sandhi"
category = "thondral"
priority = 59
description = "After demonstratives (அ, இ, உ) or interrogative 'e', if vowel/ya follows, va appears; others double"

[rules.left_context]
type = "specific_word"
words = ["அ", "இ", "உ", "எ"]

[rules.right_context]
type = "any_uyir"

[rules.transformation]
type = "insert"
text = "வ்"

# -----------------------------------------------------------------------------

[[rules]]
id = "suttu-vina-consonant-163"
nannool_verses = [163]
tamil_name = "சுட்டு வினா மெய் புணர்ச்சி"
english_name = "Demonstrative/Interrogative consonant sandhi"
category = "thondral"
priority = 59
description = "After demonstratives (அ, இ, உ) or interrogative 'e', following consonants double"

[rules.left_context]
type = "specific_word"
words = ["அ", "இ", "உ", "எ"]

[rules.right_context]
type = "any_mei"

[rules.transformation]
type = "double_initial"

# -----------------------------------------------------------------------------
# உக்குறள் Rules - Verse 164
# -----------------------------------------------------------------------------

[[rules]]
id = "ukkural-164"
nannool_verses = [164]
tamil_name = "உக்குறள் கெடுதல்"
english_name = "Short u elision"
category = "keduthal"
priority = 62
description = "Short உ drops before a following vowel, leaving the consonant"

[rules.left_context]
type = "specific_uyir"
letters = ["உ"]

[rules.right_context]
type = "any_uyir"

[rules.transformation]
type = "delete_from_first"
count = 1

# -----------------------------------------------------------------------------

[[rules]]
id = "ukkural-ya-164"
nannool_verses = [164]
tamil_name = "உக்குறள் இகரமாதல்"
english_name = "Short u to i before y"
category = "thirithal"
priority = 61
description = "Short உ becomes இ before a following ய"

[rules.left_context]
type = "specific_uyir"
letters = ["உ"]

[rules.right_context]
type = "specific_mei"
letters = ["ய்"]

[rules.transformation]
type = "replace_ending"
old = "உ"
new = "இ"

# -----------------------------------------------------------------------------

[[rules]]
id = "mutrukural-164"
nannool_verses = [164]
tamil_name = "முற்றியலுகரப் புணர்ச்சி"
english_name = "Mutriyalukaram sandhi"
category = "keduthal"
priority = 60
description = "Mutriyalukaram (unshortened u) sometimes drops before a vowel like kutriyalukaram"

[rules.left_context]
type = "specific_uyir"
letters = ["உ"]

[rules.right_context]
type = "any_uyir"

[rules.transformation]
type = "delete_from_first"
count = 1

# -----------------------------------------------------------------------------
# வல்லினம் மிகுதல் (Vallinam Doubling) - Verse 165
# -----------------------------------------------------------------------------

[[rules]]
id = "vallinam-miguthal-165"
nannool_verses = [165]
tamil_name = "வல்லினம் மிகுதல்"
english_name = "Vallinam doubling"
category = "thondral"
priority = 50
description = "Hard consonants (க ச ட த ப ற) double after vowel endings"

[rules.left_context]
type = "any_uyir"

[rules.right_context]
type = "vallinam"

[rules.transformation]
type = "double_initial"

