# Sandhi Test Cases
# Each test case specifies input, expected error status, and expected correction

# =============================================================================
# வல்லினம் மிகுதல் (Vallinam Doubling) Tests
# =============================================================================

[[tests]]
id = "vallinam-001"
input = "பாட்டு பாடினான்"
expected_error = true
rule = "vallinam-miguthal-165"
correct_form = "பாட்டுப் பாடினான்"
note = "Vallinam must double after vowel ending"

[[tests]]
id = "vallinam-002"
input = "பாட்டுப் பாடினான்"
expected_error = false
note = "Correctly doubled vallinam"

[[tests]]
id = "vallinam-003"
input = "வீடு கட்டினான்"
expected_error = true
rule = "vallinam-miguthal-165"
correct_form = "வீட்டுக் கட்டினான்"

[[tests]]
id = "vallinam-004"
input = "மரம் தருகிறது"
expected_error = false
note = "ம் ending does not require vallinam doubling directly"

[[tests]]
id = "vallinam-005"
input = "பள்ளி செல்கிறான்"
expected_error = true
rule = "vallinam-miguthal-165"
correct_form = "பள்ளிச் செல்கிறான்"

# =============================================================================
# உடம்படுமெய் (Buffer Consonant) Tests
# =============================================================================

[[tests]]
id = "udampadumei-001"
input = "தமிழ் அழகு"
expected_error = false
note = "Vowel after mei - natural combination, no buffer needed"

[[tests]]
id = "udampadumei-002"
input = "படி அழகு"
expected_error = true
rule = "udampadumei-ya-162"
correct_form = "படியழகு"
note = "After இ, ய் should appear before vowel"

[[tests]]
id = "udampadumei-003"
input = "வீடு அழகு"
expected_error = true
rule = "udampadumei-va-162"
note = "After உ, வ் should appear before vowel"

[[tests]]
id = "udampadumei-004"
input = "ஆறு ஓடுகிறது"
expected_error = true
rule = "udampadumei-va-162"
note = "After ஊ, வ் should appear before vowel"

# =============================================================================
# ஒற்று இரட்டல் (Consonant Doubling) Tests
# =============================================================================

[[tests]]
id = "otru-001"
input = "கல் அழகு"
expected_error = true
rule = "otru-irattal-205"
note = "Single kuril + mei before vowel - consonant should double"

[[tests]]
id = "otru-002"
input = "கல்லழகு"
expected_error = false
note = "Correctly doubled consonant"

[[tests]]
id = "otru-003"
input = "மரம் அழகு"
expected_error = true
rule = "otru-irattal-205"
note = "Kuril + mei pattern"

# =============================================================================
# மகர இறுதி (Mam Ending) Tests
# =============================================================================

[[tests]]
id = "mam-001"
input = "மரம் காய்கிறது"
expected_error = true
rule = "mam-vallinam-217"
note = "ம் before க should become ங்"
correct_form = "மரங்காய்கிறது"

[[tests]]
id = "mam-002"
input = "மரங்காய்கிறது"
expected_error = false
note = "Correctly transformed ம் to ங்"

# =============================================================================
# Mixed / Complex Tests
# =============================================================================

[[tests]]
id = "complex-001"
input = "தமிழ் மொழி சிறந்தது"
expected_error = false
note = "Multiple word boundaries, all correct"

[[tests]]
id = "complex-002"
input = "பாட்டு பாடினான் போனான்"
expected_error = true
rule = "vallinam-miguthal-165"
note = "First boundary has error"

[[tests]]
id = "complex-003"
input = "நல்ல புத்தகம்"
expected_error = false
note = "Vallinam after consonant ending - no doubling needed"

# =============================================================================
# Edge Cases
# =============================================================================

[[tests]]
id = "edge-001"
input = "ஒரு"
expected_error = false
note = "Single word - no boundaries to check"

[[tests]]
id = "edge-002"
input = ""
expected_error = false
note = "Empty input"

[[tests]]
id = "edge-003"
input = "Hello World"
expected_error = false
note = "Non-Tamil text"

[[tests]]
id = "edge-004"
input = "Hello தமிழ்"
expected_error = false
note = "Mixed English-Tamil"
