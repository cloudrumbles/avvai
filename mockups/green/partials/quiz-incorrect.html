<!-- Incorrect answer feedback - try again -->
<div class="quiz-progress">
  <div class="quiz-progress-dot current"></div>
  <div class="quiz-progress-dot"></div>
  <div class="quiz-progress-dot"></div>
  <div class="quiz-progress-dot"></div>
</div>

<div class="quiz-result" style="margin-bottom: var(--space-8);">
  <div class="quiz-result-icon">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <line x1="15" y1="9" x2="9" y2="15"/>
      <line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
  </div>
  <p class="quiz-result-text" style="color: var(--accent);">மீண்டும் முயற்சி செய்!</p>
  <p class="quiz-result-detail">Not quite right. Try again!</p>
</div>

<!-- Same Question 1 -->
<div class="quiz-question">
  <p class="quiz-prompt">What does this word mean?</p>
  <p class="quiz-word">வணக்கம்</p>
</div>

<div class="quiz-options">
  <button
    class="quiz-option"
    hx-post="/check-answer"
    hx-vals='{"question": 1, "answer": "goodbye"}'
    hx-target="#quiz-area"
    hx-swap="innerHTML"
  >
    Goodbye
  </button>
  <button
    class="quiz-option"
    hx-post="/check-answer"
    hx-vals='{"question": 1, "answer": "hello"}'
    hx-target="#quiz-area"
    hx-swap="innerHTML"
  >
    Hello / Greetings
  </button>
  <button
    class="quiz-option"
    hx-post="/check-answer"
    hx-vals='{"question": 1, "answer": "thank_you"}'
    hx-target="#quiz-area"
    hx-swap="innerHTML"
  >
    Thank you
  </button>
  <button
    class="quiz-option"
    hx-post="/check-answer"
    hx-vals='{"question": 1, "answer": "how_are_you"}'
    hx-target="#quiz-area"
    hx-swap="innerHTML"
  >
    How are you?
  </button>
</div>
