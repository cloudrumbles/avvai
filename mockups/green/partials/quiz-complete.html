<!-- Quiz Complete! -->
<div class="quiz-progress">
  <div class="quiz-progress-dot completed"></div>
  <div class="quiz-progress-dot completed"></div>
  <div class="quiz-progress-dot completed"></div>
  <div class="quiz-progress-dot completed"></div>
</div>

<div class="quiz-result" style="padding: var(--space-12);">
  <div class="quiz-result-icon" style="font-size: 5rem; margin-bottom: var(--space-6);">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
  </div>
  <p class="quiz-result-text" style="color: var(--primary); font-size: var(--text-3xl);">
    வாழ்த்துக்கள்!
  </p>
  <p style="font-size: var(--text-xl); margin-bottom: var(--space-2);">Congratulations!</p>
  <p class="quiz-result-detail" style="font-size: var(--text-lg); margin-bottom: var(--space-8);">
    You've completed the Greetings lesson quiz.
  </p>

  <div style="display: flex; gap: var(--space-4); justify-content: center; flex-wrap: wrap;">
    <div style="text-align: center; padding: var(--space-4) var(--space-6); background: var(--primary-soft); border-radius: var(--radius-lg);">
      <p style="font-size: var(--text-3xl); font-weight: 700; color: var(--primary); font-family: var(--font-tamil);">4/4</p>
      <p style="font-size: var(--text-sm); color: var(--foreground);">Correct</p>
    </div>
    <div style="text-align: center; padding: var(--space-4) var(--space-6); background: var(--secondary-soft); border-radius: var(--radius-lg);">
      <p style="font-size: var(--text-3xl); font-weight: 700; color: var(--secondary); font-family: var(--font-tamil);">100%</p>
      <p style="font-size: var(--text-sm); color: var(--foreground);">Score</p>
    </div>
  </div>

  <div style="margin-top: var(--space-8); display: flex; gap: var(--space-4); justify-content: center;">
    <button class="btn btn-secondary" onclick="location.reload()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Try Again
    </button>
    <a href="#" class="btn btn-primary">
      Next Lesson
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>
</div>
