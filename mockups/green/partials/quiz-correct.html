<!-- Correct answer feedback + next question -->
<div class="quiz-progress">
  <div class="quiz-progress-dot completed"></div>
  <div class="quiz-progress-dot current"></div>
  <div class="quiz-progress-dot"></div>
  <div class="quiz-progress-dot"></div>
</div>

<div class="quiz-result" style="margin-bottom: var(--space-8);">
  <div class="quiz-result-icon">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
  </div>
  <p class="quiz-result-text" style="color: var(--primary);">சரி! Correct!</p>
  <p class="quiz-result-detail">வணக்கம் means "Hello" or "Greetings"</p>
</div>

<!-- Question 2 -->
<div class="quiz-question">
  <p class="quiz-prompt">What does this word mean?</p>
  <p class="quiz-word">நன்றி</p>
</div>

<div class="quiz-options">
  <button
    class="quiz-option"
    hx-post="/check-answer"
    hx-vals='{"question": 2, "answer": "hello"}'
    hx-target="#quiz-area"
    hx-swap="innerHTML"
  >
    Hello
  </button>
  <button
    class="quiz-option"
    hx-post="/check-answer"
    hx-vals='{"question": 2, "answer": "thank_you"}'
    hx-target="#quiz-area"
    hx-swap="innerHTML"
  >
    Thank you
  </button>
  <button
    class="quiz-option"
    hx-post="/check-answer"
    hx-vals='{"question": 2, "answer": "goodbye"}'
    hx-target="#quiz-area"
    hx-swap="innerHTML"
  >
    Goodbye
  </button>
  <button
    class="quiz-option"
    hx-post="/check-answer"
    hx-vals='{"question": 2, "answer": "fine"}'
    hx-target="#quiz-area"
    hx-swap="innerHTML"
  >
    I am fine
  </button>
</div>
